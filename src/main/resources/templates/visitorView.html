<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>방명록 목록</title>
    <link rel="stylesheet" th:href="@{/css/vistor.css}"/>
    <style>
        body {
            /* 1. body는 전체 화면 정렬만 담당 */
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            font-family: sans-serif;
            background-image: url('/img/board.jpg');
            background-attachment: fixed; /* 가장 중요한 설정 (스크롤해도 배경은 고정) */
            background-size: cover;       /* 화면에 꽉 차게 */
            background-position: center;  /* 중앙 정렬 */
            background-repeat: no-repeat;
        }
        /* 2. 모든 요소를 담는 컨테이너 설정 */
        .container {
            display: flex;
            flex-direction: column; /* 요소를 세로로 쌓음 */
            align-items: center;    /* 가로 중앙 정렬 */
            width: 100%;
        }
        table {
            border-collapse: collapse;
            width: 500px;
            margin-top: 20px;
            table-layout: fixed;
            word-break: break-all;
        }
        th, td {
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }
        h1 { margin-bottom: 10px; }
        input[type=button] {
            margin-top: 10px;
            margin-bottom: 10px;
            text-align: right;
        }
        /* 버튼 그룹을 flex로 설정하여 가로 배치 및 간격 조절 */
        .button-group {
            display: flex;
            justify-content: center; /* 버튼 가로 중앙 정렬 */
            gap: 5px;               /* 버튼 사이의 간격 */
            flex-wrap: nowrap;
        }

        /* 수정/삭제 이미지 전용 클래스 추가 */
        .btn-img {
            background-color: transparent !important; /* 배경색 강제 투명 */
            border: none;                             /* 테두리 제거 */
            padding: 0;
            cursor: pointer;
        }

        /* 버튼 태그 안의 이미지가 배경색을 가지지 않도록 */
        button {
            background: none;
            border: none;
            padding: 0;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>방명록 목록</h1>
    <hr>
    <table>
        <colgroup>
            <col style="width: 10%;">
            <col style="width: 20%;">
            <col style="width: 20%;">
            <col style="width: 30%;">
            <col style="width: 20%;">
        </colgroup>
        <tr>
            <th>번호</th>
            <th>이름</th>
            <th>날짜</th>
            <th>내용</th>
        </tr>
        <tr th:each="vo : ${list}">
            <td th:text="${vo.id}"></td>
            <td th:text="${vo.name}"></td>
            <td th:text="${vo.writeDate}"></td>
            <td th:text="${vo.memo}"></td>
            <td>
                <div class="button-group">
                    <img src="/img/edit.png" width="30" alt="수정"
                        th:onclick="|displayUpdate(${vo.id})|">
                    <form th:action="@{/vdelete}" method="POST" onsubmit="return confirm('삭제하시겠습니까?')">
                      <input type="hidden" name="id" th:value="${vo.id}">
                      <button type="submit" class="btn-img">
                       <img src="/img/delete.png" width="30" alt="삭제">
                      </button>
                    </form>
                </div>
            </td>
        </tr>
    </table>
    <hr>
    <input type="button" value="메인 페이지로 돌아가기" onclick="location.href='visitorMain.html'">
</div>
</body>
</html>
